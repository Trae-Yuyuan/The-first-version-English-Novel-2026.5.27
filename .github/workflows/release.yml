name: Build and Release

on:
  push:
    tags:
      - '**'          # matches ANY tag, including Chinese

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Frontend ────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Copy frontend dist to backend static
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path backend\static
          Copy-Item -Recurse -Force frontend\dist\* backend\static\
          Write-Host "Frontend dist copied to backend/static/"

      # ── Source ZIP (always works, no Python/PyInstaller needed) ──
      - name: Package source ZIP
        shell: pwsh
        run: |
          # Include: backend (with static/) + frontend source
          $name = "AI-Novel-Translator-src.zip"
          Compress-Archive -Path backend, frontend -DestinationPath $name
          Write-Host "Source ZIP: $((Get-Item $name).Length) bytes"
          echo "SRC_ZIP=$name" >> $env:GITHUB_ENV

      # ── EXE build (PyInstaller) ────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        id: pyinstaller
        run: |
          cd backend
          pyinstaller --onedir --add-data "static;static" --name "AI-Novel-Translator" --noconsole app.py
          Write-Host "EXE built in backend/dist/AI-Novel-Translator/"
        continue-on-error: true   # EXE is optional — ZIP is the guaranteed artifact

      - name: Package EXE ZIP
        if: steps.pyinstaller.outcome == 'success'
        shell: pwsh
        run: |
          $name = "AI-Novel-Translator-Windows.zip"
          Compress-Archive -Path backend\dist\AI-Novel-Translator\* -DestinationPath $name
          Write-Host "EXE ZIP: $((Get-Item $name).Length) bytes"
          echo "EXE_ZIP=$name" >> $env:GITHUB_ENV

      # ── Create Release with all artifacts ───────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            ${{ env.SRC_ZIP }}
            ${{ env.EXE_ZIP }}
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
