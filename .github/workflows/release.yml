name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Copy frontend to backend static
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path backend\static
          Copy-Item -Recurse -Force frontend\dist\* backend\static\

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          cd backend
          pyinstaller --onedir --add-data "static;static" --name "AI-Novel-Translator" --noconsole app.py

      - name: Package release zip
        shell: pwsh
        run: |
          Compress-Archive -Path backend\dist\AI-Novel-Translator\* -DestinationPath AI-Novel-Translator-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: AI-Novel-Translator-Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
