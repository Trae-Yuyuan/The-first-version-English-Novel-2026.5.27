name: Build Electron App

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm i -g pnpm@9

      # ✅ 强制确认目录（关键修复点）
      - name: Show files
        run: dir

      - name: Verify pnpm works
        run: pnpm -v

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Vite
        run: pnpm run build

      - name: Build Electron
        run: pnpm run build:desktop

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EmotionAI-Windows
          path: dist