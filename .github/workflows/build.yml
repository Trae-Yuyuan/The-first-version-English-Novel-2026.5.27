name: Build Electron App

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: corepack enable

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm run build:web

      - run: npx electron-builder --publish never